<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220" role="img" aria-labelledby="title desc">
  <title id="title">TESSART Wordmark</title>
  <desc id="desc">French atelier style wordmark for TESSART</desc>
  <rect width="980" height="220" fill="none"/>

  <g fill="#1f1d1a">
    <text x="490" y="102" text-anchor="middle" font-family="Garamond, 'Times New Roman', serif" font-size="92" letter-spacing="10">TESSART</text>
  </g>

  <g stroke="#8b7358" stroke-width="1.8" fill="none" opacity="0.85">
    <line x1="120" y1="38" x2="360" y2="38"/>
    <line x1="620" y1="38" x2="860" y2="38"/>
    <line x1="120" y1="176" x2="360" y2="176"/>
    <line x1="620" y1="176" x2="860" y2="176"/>
  </g>

  <g fill="#8b7358" opacity="0.9">
    <circle cx="490" cy="38" r="3.8"/>
    <circle cx="490" cy="176" r="3.8"/>
  </g>

  <text x="490" y="145" text-anchor="middle" font-family="'Times New Roman', serif" font-size="18" letter-spacing="3" fill="#5f584e">ATELIER DE PORTRAIT · SAINT-PÉTERSBOURG</text>
</svg>
